apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        image: 123185598576.dkr.ecr.ap-south-1.amazonaws.com/devsecops-app:18
        ports:
        - containerPort: 5000
